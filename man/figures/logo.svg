<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181 209" width="181" height="209">
  <defs>
    <!-- Hexagon clip path -->
    <clipPath id="hex-clip">
      <polygon points="90.5,4 177,52 177,157 90.5,205 4,157 4,52"/>
    </clipPath>

    <!-- Flame gradient - outer -->
    <radialGradient id="flame-outer" cx="50%" cy="75%" r="55%" fx="50%" fy="80%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#E25822" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#C0392B" stop-opacity="1"/>
      <stop offset="100%" stop-color="#8B1A1A" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Flame gradient - inner/core -->
    <radialGradient id="flame-inner" cx="50%" cy="70%" r="45%" fx="50%" fy="75%">
      <stop offset="0%"   stop-color="#FFF0A0" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#FFD040" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#FF8C00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E25822" stop-opacity="0"/>
    </radialGradient>

    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2A0800"/>
      <stop offset="50%"  stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#0D0400"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle text shadow -->
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Hex background -->
  <polygon
    points="90.5,4 177,52 177,157 90.5,205 4,157 4,52"
    fill="url(#bg-grad)"
    stroke="#E25822"
    stroke-width="5"
  />

  <!-- Inner hex ring (subtle) -->
  <polygon
    points="90.5,12 170,57 170,152 90.5,197 11,152 11,57"
    fill="none"
    stroke="#8B1A1A"
    stroke-width="1"
    opacity="0.5"
  />

  <!-- ── Flame shape ── -->
  <!-- Outer flame body -->
  <path clip-path="url(#hex-clip)"
    d="M90.5,165
       C65,165 45,148 45,125
       C45,108 58,95 65,82
       C68,75 70,67 68,58
       C74,66 78,75 76,87
       C82,78 84,66 80,55
       C87,65 92,78 88,93
       C93,83 97,72 93,60
       C101,73 104,90 98,107
       C107,98 112,86 108,73
       C117,88 118,108 110,125
       C118,118 122,108 120,97
       C126,113 125,132 116,145
       C110,155 101,165 90.5,165 Z"
    fill="url(#flame-outer)"
    filter="url(#glow)"
    opacity="0.95"
  />

  <!-- Inner flame core -->
  <path clip-path="url(#hex-clip)"
    d="M90.5,158
       C74,158 61,144 61,128
       C61,116 70,107 74,96
       C77,88 77,79 75,70
       C80,78 82,87 80,97
       C85,88 86,77 83,67
       C90,78 93,91 89,104
       C94,96 97,86 94,76
       C101,89 102,106 96,120
       C102,113 105,104 103,94
       C108,107 107,122 100,133
       C96,141 90.5,158 90.5,158 Z"
    fill="url(#flame-inner)"
    opacity="0.85"
  />

  <!-- Ember glow at base -->
  <ellipse
    cx="90.5" cy="162"
    rx="22" ry="6"
    fill="#FF6B00"
    opacity="0.3"
    filter="url(#glow)"
    clip-path="url(#hex-clip)"
  />

  <!-- ── Text ── -->
  <!-- "fireR" -->
  <text
    x="90.5"
    y="188"
    font-family="Montserrat, 'Source Sans 3', sans-serif"
    font-weight="700"
    font-size="24"
    fill="#FFF8F0"
    text-anchor="middle"
    letter-spacing="1"
    filter="url(#text-shadow)"
  >fireR</text>

  <!-- Subtle ember sparks -->
  <circle cx="68"  cy="105" r="2" fill="#FF8C42" opacity="0.7" filter="url(#glow)"/>
  <circle cx="115" cy="95"  r="1.5" fill="#FFD040" opacity="0.6" filter="url(#glow)"/>
  <circle cx="77"  cy="78"  r="1.5" fill="#FF6B00" opacity="0.5" filter="url(#glow)"/>
  <circle cx="103" cy="78"  r="1"   fill="#FFD040" opacity="0.55" filter="url(#glow)"/>
  <circle cx="90"  cy="62"  r="1.5" fill="#FFF0A0" opacity="0.5" filter="url(#glow)"/>
</svg>
