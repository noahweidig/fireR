url: https://noahweidig.github.io/fireR/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    danger: "#A6081A"

home:
  title: "fireR • USGS Fire Data and Ecoregion Boundaries for R"
  description: >
    Fast, convenient access to USGS MTBS fire data, SE FireMap annual burn
    severity mosaics, and EPA/CEC ecoregion boundaries.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, lightswitch, github]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    github:
      icon: fa-github
      href: https://github.com/noahweidig/fireR
      aria-label: GitHub

authors:
  Noah Weidig:
    href: https://github.com/noahweidig

footer:
  structure:
    left: developed_by
    right: built_with

reference:
  - title: "MTBS Fire Data"
    desc: >
      Download MTBS (Monitoring Trends in Burn Severity) fire data archives
      (perimeter polygons or occurrence points) and read perimeter records as
      spatial objects with optional year and incident-type filtering.
    contents:
      - get_mtbs
      - read_mtbs

  - title: "NIFC Wildfire Data"
    desc: >
      Download NIFC (National Interagency Fire Center) wildfire perimeters from figshare and
      Fire Occurrence Database (FOD) datasets from the Forest Service Research Data Archive,
      and read the downloaded archives as spatial objects with optional year filtering.
    contents:
      - get_nifc
      - read_nifc
      - get_fod
      - read_fod

  - title: "USFS Wildland-Urban Interface (WUI)"
    desc: >
      Download the USFS Wildland-Urban Interface (WUI) dataset (~4.65 GB) from
      the USFS public Box archive.  This dataset delineates areas where
      structures and human development meet or intermingle with undeveloped
      wildland vegetation.  Warning: the download is large and slow; run in a
      background session.
    contents:
      - get_wui

  - title: "SE FireMap"
    desc: >
      Download Southeast FireMap Annual Burn Severity Mosaic ZIP archives for
      one or more years (2000-2022) covering 78 ARD Landsat tiles across the
      southeastern United States, as well as single-file datasets for Fire
      History and Burned Area products (1994-2024).
    contents:
      - get_sefire

  - title: "Ecoregion Boundaries"
    desc: >
      Load CEC North America ecoregion boundaries at Levels 1-3 and US EPA
      ecoregion boundaries at Levels 3-4 as sf or terra SpatVector objects.
    contents:
      - get_nal1eco
      - get_nal2eco
      - get_nal3eco
      - get_usl3eco
      - get_usl4eco

  - title: "Package"
    desc: "Package-level documentation and overview."
    contents:
      - fireR-package

articles:
  - title: "Tutorials"
    navbar: ~
    contents:
      - getting-started
