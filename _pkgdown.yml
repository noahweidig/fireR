url: https://noahweidig.github.io/fireR/

template:
  bootstrap: 5
  bootswatch: darkly
  light-switch: true

home:
  title: "fireR • MTBS Wildfire Perimeters for R"
  description: >
    Fast, convenient access to MTBS (Monitoring Trends in Burn Severity)
    fire perimeter data straight from the USGS. One function. Zero fuss.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    github:
      icon: fa-github
      href: https://github.com/noahweidig/fireR
      aria-label: GitHub

authors:
  Noah Weidig:
    href: https://github.com/noahweidig

footer:
  structure:
    left: developed_by
    right: built_with

reference:
  - title: "Fire Data"
    desc: >
      Download and read MTBS wildfire perimeter data.
    contents:
      - get_mtbs
      - get_sefire
      - read_mtbs

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - fireR-package

articles:
  - title: "Tutorials"
    navbar: ~
    contents:
      - getting-started
