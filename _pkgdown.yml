url: https://noahweidig.github.io/fireR/

template:
  bootstrap: 5
  bslib:
    primary: "#E25822"
    secondary: "#78350f"
    success: "#166534"
    danger: "#dc2626"
    light: "#fafaf9"
    dark: "#1c1917"
    base_font:
      google:
        family: "Source Sans 3"
    heading_font:
      google:
        family: "Montserrat"
        wght: [500, 600, 700]
    code_font:
      google:
        family: "Fira Code"
    bg: "#ffffff"
    fg: "#1c1917"
    navbar-bg: "#1c1917"
    navbar-fg: "#fafaf9"
    navbar-brand-color: "#E25822"
    link-color: "#E25822"
    link-hover-color: "#c2410c"
    pkgdown-navbar-bg: "#1c1917"
  includes:
    in_header: |
      <script>
        (function () {
          var t = localStorage.getItem('fireR-theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-bs-theme', 'dark');
          }
        })();
      </script>
      <style>
        /* ── Custom properties ─────────────────────────────────────── */
        :root {
          --fr-accent:         #e25822;
          --fr-accent-hover:   #c2410c;
          --fr-surface:        #fafaf9;
          --fr-border:         #e7e5e4;
          --fr-text:           #1c1917;
          --fr-muted:          #78716c;
          --fr-code-inline-bg: #f4f4f5;
          --fr-code-inline-fg: #3f3f46;
          --fr-block-bg:       #18181b;
          --fr-block-fg:       #e4e4e7;
          --fr-toc-link:       #57534e;
          --fr-toc-active:     #e25822;
          --fr-shadow-sm:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
          --fr-shadow-md:      0 4px 16px rgba(0,0,0,.1);
        }
        [data-bs-theme="dark"] {
          --fr-surface:        #1a1917;
          --fr-border:         #292524;
          --fr-text:           #f5f5f4;
          --fr-muted:          #a8a29e;
          --fr-code-inline-bg: #27272a;
          --fr-code-inline-fg: #d4d4d8;
          --fr-block-bg:       #09090b;
          --fr-block-fg:       #e4e4e7;
          --fr-toc-link:       #a8a29e;
          --fr-toc-active:     #fb923c;
          --fr-shadow-sm:      0 1px 3px rgba(0,0,0,.35);
          --fr-shadow-md:      0 4px 16px rgba(0,0,0,.4);
        }

        /* ── Dark mode body ────────────────────────────────────────── */
        [data-bs-theme="dark"] body {
          background-color: #0f0e0d;
          color: var(--fr-text);
        }
        [data-bs-theme="dark"] .container-fluid,
        [data-bs-theme="dark"] .container {
          background-color: transparent;
        }

        /* ── Navbar ────────────────────────────────────────────────── */
        .navbar {
          background: #1c1917 !important;
          border-bottom: 1px solid rgba(226, 88, 34, 0.25);
          box-shadow: var(--fr-shadow-sm);
        }
        .navbar-brand {
          font-weight: 700;
          font-size: 1.2rem;
          letter-spacing: -0.01em;
          color: var(--fr-accent) !important;
        }
        .nav-link {
          color: rgba(250, 250, 249, 0.75) !important;
          font-weight: 500;
          font-size: 0.9rem;
          transition: color 0.15s ease;
        }
        .nav-link:hover,
        .nav-link.active {
          color: #fafaf9 !important;
        }

        /* ── Theme toggle ──────────────────────────────────────────── */
        #theme-toggle {
          background: transparent;
          border: 1px solid rgba(250, 250, 249, 0.2);
          border-radius: 6px;
          color: rgba(250, 250, 249, 0.65);
          cursor: pointer;
          padding: 3px 8px;
          line-height: 1.5;
          transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
          font-size: 0.8rem;
          display: flex;
          align-items: center;
          gap: 4px;
        }
        #theme-toggle:hover {
          background: rgba(250, 250, 249, 0.08);
          border-color: rgba(250, 250, 249, 0.35);
          color: #fafaf9;
        }

        /* ── TOC — "On this page" ──────────────────────────────────── */
        /* sidebar wrapper */
        .sidebar,
        #pkgdown-sidebar,
        .pkgdown-sidebar,
        #toc {
          background: var(--fr-surface);
          border: 1px solid var(--fr-border);
          border-left: 3px solid var(--fr-accent);
          border-radius: 8px;
          padding: 1rem 1rem 1rem 1.1rem;
        }
        /* heading */
        .sidebar h2,
        #pkgdown-sidebar h2,
        .pkgdown-sidebar h2,
        #toc h2 {
          color: var(--fr-muted);
          font-size: 0.68rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          margin-bottom: 0.6rem;
        }
        /* all links in the sidebar/toc */
        .sidebar a,
        #pkgdown-sidebar a,
        .pkgdown-sidebar a,
        #toc a {
          color: var(--fr-toc-link) !important;
          text-decoration: none;
          font-size: 0.875rem;
          line-height: 1.65;
          transition: color 0.15s ease;
          display: block;
          padding: 0.1rem 0;
        }
        .sidebar a:hover,
        #pkgdown-sidebar a:hover,
        .pkgdown-sidebar a:hover,
        #toc a:hover {
          color: var(--fr-accent) !important;
        }
        .sidebar a.active,
        #pkgdown-sidebar a.active,
        .pkgdown-sidebar a.active,
        #toc a.active {
          color: var(--fr-toc-active) !important;
          font-weight: 600;
        }
        /* nav-pills inside sidebar (pkgdown Bootstrap 5) */
        .sidebar .nav-pills .nav-link,
        #pkgdown-sidebar .nav-pills .nav-link,
        .pkgdown-sidebar .nav-pills .nav-link {
          color: var(--fr-toc-link) !important;
          background: transparent;
          border-radius: 5px;
          padding: 0.2rem 0.5rem;
          font-size: 0.875rem;
          font-weight: 400;
        }
        .sidebar .nav-pills .nav-link:hover,
        #pkgdown-sidebar .nav-pills .nav-link:hover,
        .pkgdown-sidebar .nav-pills .nav-link:hover {
          color: var(--fr-accent) !important;
          background: rgba(226, 88, 34, 0.07);
        }
        .sidebar .nav-pills .nav-link.active,
        #pkgdown-sidebar .nav-pills .nav-link.active,
        .pkgdown-sidebar .nav-pills .nav-link.active {
          color: var(--fr-toc-active) !important;
          background: rgba(226, 88, 34, 0.1);
          font-weight: 600;
        }

        /* ── Inline code ───────────────────────────────────────────── */
        p code, li code, td code, h1 code, h2 code, h3 code, h4 code, dt code {
          background: var(--fr-code-inline-bg);
          color: var(--fr-code-inline-fg);
          padding: 0.1em 0.38em;
          border-radius: 4px;
          font-size: 0.875em;
          font-weight: 400;
          border: none;
        }

        /* ── Code blocks ───────────────────────────────────────────── */
        div.sourceCode {
          background: var(--fr-block-bg);
          border-radius: 8px;
          border: 1px solid rgba(255,255,255,0.05);
          border-left: 3px solid var(--fr-accent);
          box-shadow: var(--fr-shadow-sm);
          margin: 1.2rem 0;
        }
        pre.sourceCode {
          background: transparent !important;
          margin: 0;
          padding: 0.9rem 1rem;
        }
        pre.sourceCode code,
        pre code {
          background: transparent !important;
          color: var(--fr-block-fg);
          font-size: 0.85rem;
          line-height: 1.7;
        }
        /* Syntax tokens — neutral, readable palette */
        code.sourceCode .kw { color: #c084fc; font-weight: 500; }  /* keywords   */
        code.sourceCode .fu { color: #60a5fa; }                     /* functions  */
        code.sourceCode .st { color: #86efac; }                     /* strings    */
        code.sourceCode .dv { color: #fb923c; }                     /* numbers    */
        code.sourceCode .co { color: #71717a; font-style: italic; } /* comments   */
        code.sourceCode .sc { color: #f0abfc; }                     /* spec chars */
        code.sourceCode .op { color: #94a3b8; }                     /* operators  */
        code.sourceCode .cn { color: #fbbf24; }                     /* constants  */

        /* ── Page / article header ─────────────────────────────────── */
        .page-header {
          background: linear-gradient(135deg, #1c1917 0%, #44200c 100%);
          color: #fafaf9;
          padding: 3rem 0 2.5rem;
          margin-bottom: 2rem;
          border-bottom: 2px solid var(--fr-accent);
        }
        [data-bs-theme="dark"] .page-header {
          background: linear-gradient(135deg, #0f0e0d 0%, #1c1008 100%);
        }
        .page-header h1 { color: #fafaf9; }
        .page-header .lead { color: #d6d3d1; font-size: 1.1rem; }

        /* ── Cards ─────────────────────────────────────────────────── */
        .card {
          border: 1px solid var(--fr-border);
          border-radius: 10px;
          background: var(--fr-surface);
          box-shadow: var(--fr-shadow-sm);
          transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        .card:hover {
          box-shadow: 0 4px 18px rgba(226, 88, 34, 0.12);
          transform: translateY(-2px);
        }
        .card-header {
          background: linear-gradient(135deg, #e25822, #c2410c);
          color: #fff;
          font-weight: 600;
          border-radius: 9px 9px 0 0 !important;
          border: none;
        }

        /* ── Tables ─────────────────────────────────────────────────── */
        .table thead th {
          background: var(--fr-accent);
          color: #fff;
          font-weight: 600;
          font-size: 0.82rem;
          letter-spacing: 0.04em;
          text-transform: uppercase;
          border: none;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
          background-color: rgba(0, 0, 0, 0.02);
        }
        [data-bs-theme="dark"] .table-striped > tbody > tr:nth-of-type(odd) > * {
          background-color: rgba(255, 255, 255, 0.03);
        }
        [data-bs-theme="dark"] .table {
          color: var(--fr-text);
          border-color: var(--fr-border);
        }

        /* ── Reference index ────────────────────────────────────────── */
        .ref-index h2 {
          color: var(--fr-text);
          border-bottom: 1px solid var(--fr-border);
          padding-bottom: 0.5rem;
          margin-top: 2.5rem;
          font-size: 0.85rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.06em;
        }
        .ref-index .alias a {
          color: var(--fr-accent);
          font-weight: 600;
        }
        .ref-index .alias a:hover {
          color: var(--fr-accent-hover);
        }

        /* ── Function doc pages ─────────────────────────────────────── */
        .page-ref h2 {
          color: var(--fr-text);
          border-bottom: 1px solid var(--fr-border);
          padding-bottom: 0.3rem;
        }
        .page-ref h3 {
          color: var(--fr-muted);
          font-size: 0.8rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.07em;
          margin-top: 1.75rem;
        }

        /* ── Footer ─────────────────────────────────────────────────── */
        footer {
          background: #1c1917;
          color: #a8a29e;
          border-top: 1px solid #292524;
          padding: 1.5rem 0;
          font-size: 0.875rem;
        }
        footer a { color: var(--fr-accent); }
        footer a:hover { color: #fb923c; }
        [data-bs-theme="dark"] footer {
          background: #0d0c0b;
        }

        /* ── Navbar logo ─────────────────────────────────────────────  */
        .navbar-brand img {
          transition: opacity 0.2s ease;
        }
        .navbar-brand img:hover { opacity: 0.8; }

        /* ── Badges ─────────────────────────────────────────────────── */
        .badge { font-weight: 600; letter-spacing: 0.03em; }

        /* ── Anchor links ───────────────────────────────────────────── */
        a.anchor { color: var(--fr-border) !important; }
        a.anchor:hover { color: var(--fr-accent) !important; }
      </style>
    after_body: |
      <script>
        (function () {
          var SUN = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>';
          var MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>';

          function isDark() {
            return document.documentElement.getAttribute('data-bs-theme') === 'dark';
          }

          var btn = document.createElement('button');
          btn.id = 'theme-toggle';
          btn.setAttribute('aria-label', 'Toggle light / dark mode');
          btn.title = 'Toggle light / dark mode';

          function updateIcon() {
            btn.innerHTML = isDark() ? (SUN + ' Light') : (MOON + ' Dark');
          }
          updateIcon();

          btn.addEventListener('click', function () {
            var next = isDark() ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('fireR-theme', next);
            updateIcon();
          });

          // Insert into the right-hand navbar-nav (last one = search/github icons)
          document.addEventListener('DOMContentLoaded', function () {
            var navs = document.querySelectorAll('.navbar-nav');
            var target = navs[navs.length - 1];
            if (target) {
              var li = document.createElement('li');
              li.className = 'nav-item d-flex align-items-center ms-1';
              li.appendChild(btn);
              target.appendChild(li);
            }
          });
        })();
      </script>

home:
  title: "fireR • MTBS Wildfire Perimeters for R"
  description: >
    Fast, convenient access to MTBS (Monitoring Trends in Burn Severity)
    fire perimeter data straight from the USGS. One function. Zero fuss.
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    github:
      icon: fa-github
      href: https://github.com/noahweidig/fireR
      aria-label: GitHub

authors:
  Noah Weidig:
    href: https://github.com/noahweidig

footer:
  structure:
    left: developed_by
    right: built_with

reference:
  - title: "Downloading Fire Data"
    desc: >
      The primary interface for accessing MTBS wildfire perimeter data.
      Downloads the USGS composite burned-area shapefile and returns it
      as an `sf` or `terra::SpatVector` object.
    contents:
      - get_mtbs

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - fireR-package

articles:
  - title: "Tutorials"
    navbar: ~
    contents:
      - getting-started
